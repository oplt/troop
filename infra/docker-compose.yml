version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: app_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set in infra/.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in infra/.env}
      POSTGRES_DB: ${POSTGRES_DB:?set in infra/.env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: app_redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.27
    container_name: app_mailpit
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"

  minio:
    image: minio/minio:RELEASE.2026-01-03T04-44-24Z
    container_name: app_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set in infra/.env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in infra/.env}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
